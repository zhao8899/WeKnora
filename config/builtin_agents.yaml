# Built-in Agent Configuration with i18n support
# Each agent has localized name, description, avatar, and config overrides per language.
# The "default" locale is used as fallback when the user's language is not found.

builtin_agents:
  - id: "builtin-quick-answer"
    avatar: ""
    is_builtin: true
    i18n:
      default:
        name: "Quick Answer"
        description: "Knowledge base RAG Q&A for fast and accurate answers"
      zh-CN:
        name: "快速问答"
        description: "基于知识库的 RAG 问答，快速准确地回答问题"
    config:
      agent_mode: "quick-answer"
      system_prompt_id: "default_kb"
      context_template_id: "default_context"
      temperature: 0.7
      max_completion_tokens: 2048
      web_search_enabled: true
      web_search_max_results: 5
      multi_turn_enabled: true
      history_turns: 5
      kb_selection_mode: "all"
      retrieve_kb_only_when_mentioned: false
      faq_priority_enabled: true
      faq_direct_answer_threshold: 0.9
      faq_score_boost: 1.2
      embedding_top_k: 10
      keyword_threshold: 0.3
      vector_threshold: 0.5
      rerank_top_k: 10
      rerank_threshold: 0.3
      enable_query_expansion: true
      enable_rewrite: true
      fallback_strategy: "model"

  - id: "builtin-smart-reasoning"
    avatar: ""
    is_builtin: true
    i18n:
      default:
        name: "Smart Reasoning"
        description: "ReAct reasoning framework with multi-step thinking and tool calling"
      zh-CN:
        name: "智能推理"
        description: "ReAct 推理框架，支持多步思考与工具调用"
    config:
      agent_mode: "smart-reasoning"
      system_prompt: ""
      temperature: 0.7
      max_completion_tokens: 2048
      max_iterations: 50
      kb_selection_mode: "all"
      retrieve_kb_only_when_mentioned: false
      allowed_tools:
        - "thinking"
        - "todo_write"
        - "knowledge_search"
        - "grep_chunks"
        - "list_knowledge_chunks"
        - "query_knowledge_graph"
        - "get_document_info"
      web_search_enabled: true
      web_search_max_results: 5
      reflection_enabled: false
      multi_turn_enabled: true
      history_turns: 5
      faq_priority_enabled: true
      faq_direct_answer_threshold: 0.9
      faq_score_boost: 1.2
      embedding_top_k: 10
      keyword_threshold: 0.3
      vector_threshold: 0.5
      rerank_top_k: 10
      rerank_threshold: 0.3

  - id: "builtin-data-analyst"
    avatar: "📊"
    is_builtin: true
    i18n:
      default:
        name: "Data Analyst"
        description: "Professional data analysis agent with SQL query and statistical analysis for CSV/Excel files"
      zh-CN:
        name: "数据分析师"
        description: "专业的数据分析智能体，支持对 CSV/Excel 文件进行 SQL 查询和统计分析"
    config:
      agent_mode: "smart-reasoning"
      system_prompt_id: "data_analyst"
      temperature: 0.3
      max_completion_tokens: 4096
      max_iterations: 30
      kb_selection_mode: "all"
      retrieve_kb_only_when_mentioned: false
      supported_file_types:
        - "csv"
        - "xlsx"
      allowed_tools:
        - "thinking"
        - "todo_write"
        - "data_schema"
        - "data_analysis"
      web_search_enabled: false
      web_search_max_results: 0
      reflection_enabled: true
      multi_turn_enabled: true
      history_turns: 10
      embedding_top_k: 5
      keyword_threshold: 0.3
      vector_threshold: 0.5
      rerank_top_k: 5
      rerank_threshold: 0.3

  - id: "builtin-deep-researcher"
    avatar: "🔬"
    is_builtin: true
    i18n:
      default:
        name: "Deep Researcher"
        description: "Exhaustive multi-source research agent combining KB and web search for comprehensive reports"
      zh-CN:
        name: "深度研究员"
        description: "多源深度研究智能体，结合知识库与网络搜索生成全面的研究报告"
    config:
      agent_mode: "smart-reasoning"
      system_prompt_id: "deep_researcher"
      temperature: 0.5
      max_completion_tokens: 4096
      max_iterations: 50
      kb_selection_mode: "all"
      retrieve_kb_only_when_mentioned: false
      allowed_tools:
        - "thinking"
        - "todo_write"
        - "knowledge_search"
        - "grep_chunks"
        - "list_knowledge_chunks"
        - "get_document_info"
        - "web_search"
        - "web_fetch"
      web_search_enabled: true
      web_search_max_results: 10
      reflection_enabled: true
      multi_turn_enabled: true
      history_turns: 5
      embedding_top_k: 15
      keyword_threshold: 0.3
      vector_threshold: 0.4
      rerank_top_k: 10
      rerank_threshold: 0.3

  - id: "builtin-knowledge-graph-expert"
    avatar: "🕸️"
    is_builtin: true
    i18n:
      default:
        name: "Knowledge Graph Expert"
        description: "Explores entity relationships and semantic networks in the knowledge graph"
      zh-CN:
        name: "知识图谱专家"
        description: "专注于知识图谱中的实体关系探索与语义网络分析"
    config:
      agent_mode: "smart-reasoning"
      system_prompt_id: "knowledge_graph_expert"
      temperature: 0.4
      max_completion_tokens: 3000
      max_iterations: 30
      kb_selection_mode: "all"
      retrieve_kb_only_when_mentioned: false
      allowed_tools:
        - "thinking"
        - "todo_write"
        - "query_knowledge_graph"
        - "knowledge_search"
        - "grep_chunks"
        - "list_knowledge_chunks"
      web_search_enabled: false
      web_search_max_results: 0
      reflection_enabled: false
      multi_turn_enabled: true
      history_turns: 5
      embedding_top_k: 10
      keyword_threshold: 0.3
      vector_threshold: 0.5
      rerank_top_k: 5
      rerank_threshold: 0.3

  - id: "builtin-document-assistant"
    avatar: "📄"
    is_builtin: true
    i18n:
      default:
        name: "Document Assistant"
        description: "Reads, summarizes, and answers questions about documents in the knowledge base"
      zh-CN:
        name: "文档助手"
        description: "专注于知识库中文档的阅读、摘要与问答"
    config:
      agent_mode: "smart-reasoning"
      system_prompt_id: "document_assistant"
      temperature: 0.3
      max_completion_tokens: 3000
      max_iterations: 20
      kb_selection_mode: "all"
      retrieve_kb_only_when_mentioned: false
      allowed_tools:
        - "thinking"
        - "todo_write"
        - "knowledge_search"
        - "grep_chunks"
        - "list_knowledge_chunks"
        - "get_document_info"
      web_search_enabled: false
      web_search_max_results: 0
      reflection_enabled: false
      multi_turn_enabled: true
      history_turns: 10
      embedding_top_k: 15
      keyword_threshold: 0.3
      vector_threshold: 0.5
      rerank_top_k: 10
      rerank_threshold: 0.3
